<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Multi Logic Checker</title>
</head>

<body class="bg-linear-to-r from-cyan-500 to-blue-500">
    <div class="items-centre mx-50 my-50 md:mx-50 md:my-50 md ml:30">
        <h1 class="text-white text-3xl font-bold text-center py-4 font-mono border-b-2 border-gray-300
">Logic Checker</h1>
        <div class="container mx-auto mt-10">
            <div class="flex flex-col items-center">
                <input id="logicInput" type="text" placeholder="Enter your logic statement here"
                    class="w-full md:w-1/2 p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#2563eb] text-white text-center bg-transparent">
                <button id="checkButton"
                    class="mt-4 px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-[#2563eb]">
                    Check Logic
                </button>
                <div id="result" class="mt-4 text-xl font-semibold"></div>
            </div>
        </div>
    </div>
    <script src="./Logic_checker.js"></script>
</body>

</html>
